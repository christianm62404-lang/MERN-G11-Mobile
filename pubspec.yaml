name: mern_g11_mobile
description: Flutter mobile app for G11 project and time tracking.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Secure storage for JWT
  flutter_secure_storage: ^9.2.2

  # Push Notifications
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.2.2

  # Navigation
  go_router: ^14.2.7

  # UI / Charts
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.3.2
  jwt_decoder: ^2.0.1
  google_fonts: ^6.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
