<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover"
  >
  <meta name="description" content="TimeTrack app for project, task, and session time tracking.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TimeTrack">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TimeTrack</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0f1720;
      color: #ffffff;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #loading-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(180deg, #10181f 0%, #141d24 100%);
      z-index: 9999;
    }

    #loading-shell h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    #loading-shell p {
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 14px;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid rgba(255, 255, 255, 0.22);
      border-top-color: #0b6b63;
      border-radius: 999px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-shell" role="status" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <h1>TimeTrack</h1>
    <p>Loading your workspace…</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const shell = document.getElementById('loading-shell');
      if (shell) shell.remove();
    });

    // Fallback safety in case first-frame event is delayed/missed.
    setTimeout(function () {
      const shell = document.getElementById('loading-shell');
      if (shell) shell.remove();
    }, 10000);
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
